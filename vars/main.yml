---
###############################################################################
# Init (Provision) Role Options
###############################################################################

# Last time {ROLE} options were validated against a default configuration.
init_role_validate_date: '2024-06-24'
init_role_validate_release: 'bookworm'

# Default packages for {ROLE}.
init_role_packages:
  - 'sudo'  # users requiring sudo
  - 'ssh'  # ssh, sshd

# Default state for apt package installation. See ansible.builtin.apt.
init_role_package_state: 'latest'

# Default timeout for long actions (seconds).
init_role_timeout: 600
